1| name: Build and Release
2| 
3| on:
4|   push:
5|     tags:
6|       - 'v*'
7|   workflow_dispatch:
8| 
9| permissions:
10|   contents: write
11| 
12| jobs:
13|   build:
14|     runs-on: ubuntu-latest
15|     steps:
16|       - name: Checkout 本仓库代码
17|         uses: actions/checkout@v4
18|         with:
19|           fetch-depth: 1
20| 
21|       - name: 安装系统依赖（gcc、mingw、gtk 等）
22|         run: |
23|           sudo apt-get update
24|           sudo apt-get install -y \
25|             gcc make build-essential libgtk2.0-dev \
26|             git mingw-w64 g++-mingw-w64-x86-64 \
27|             mingw-w64-x86-64-dev \
28|             # 下面是为 Harbour 的可选模块和常见 dev 包添加（避免大量 Missing dependency 错误）
29|             zlib1g-dev libpng-dev libjpeg-dev libfreetype6-dev \
30|             libbz2-dev libexpat1-dev libcurl4-openssl-dev libgd-dev \
31|             libfreeimage-dev libmagic-dev unixodbc-dev ghostscript \
32|             libcups2-dev libssl-dev
33| 
34|       # ====================== Harbour 最新 commit（用于缓存 key） ======================
35|       - name: 获取 Harbour 最新 commit（缓存专用）
36|         id: harbour-commit
37|         run: echo "commit=$(git ls-remote https://github.com/harbour/core.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
38| 
39|       - name: 获取 HwGUI 最新 commit（缓存专用）
40|         id: hwgui-commit
41|         run: echo "commit=$(git ls-remote https://github.com/JoseQuintas/hwgui_fork.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
42|       # =================================================================================
43| 
44|       # ====================== Harbour Linux 原生编译 + 缓存 ======================
45|       - name: Cache Harbour Linux
46|         id: cache-harbour-linux
47|         uses: actions/cache@v4
48|         with:
49|           path: /opt/harbour
50|           key: harbour-linux-${{ steps.harbour-commit.outputs.commit }}-${{ runner.os }}
51| 
52|       - name: 编译 Harbour Linux（缓存未命中时执行）
53|         if: steps.cache-harbour-linux.outputs.cache-hit != 'true'
54|         env:
55|           HB_COMPILER: gcc
56|         run: |
57|           git clone https://github.com/harbour/core /tmp/harbour-linux --depth 1
58|           cd /tmp/harbour-linux
59|           sudo mkdir -p /opt/harbour
60|           export HB_USER_CFLAGS="-fPIC"
61|           export HB_BUILD_CONTRIBS=""
62|           export HB_WITH_PCRE=local
63|           export HB_INSTALL_PREFIX=/opt/harbour
64|           export HB_MT=yes                       #启用多线程支持
65|           # 为降低对外部可选库的依赖，禁用一些可选模块（可选：若你愿意可安装对应 dev 包）
66|           export HB_WITH_GD=no
67|           export HB_WITH_FREEIMAGE=no
68|           export HB_WITH_CURL=no
69|           export HB_WITH_BZIP2=no
70|           export HB_WITH_ODBC=no
71|           export HB_WITH_FIREBIRD=no
72|           export HB_WITH_MAGIC=no
73|           export HB_WITH_CUPS=no
74|           export HB_WITH_ALLEGRO=no
75|           make -j$(nproc)
76|           sudo mkdir -p /opt/harbour
77|           sudo make install
78| 
79|       - name: 把 Harbour Linux 添加到 PATH（hbmk2 能直接调用）
80|         run: echo "/opt/harbour/bin" >> $GITHUB_PATH
81| 
82|       - name: 验证 Harbour 安装
83|         run: |
84|           echo "列出 /opt/harbour/bin 内容："
85|           ls -l /opt/harbour/bin || true
86|           if [ -x /opt/harbour/bin/hbmk2 ]; then
87|             /opt/harbour/bin/hbmk2 --version || true
88|             echo "hbmk2 found at /opt/harbour/bin/hbmk2"
89|           else
90|             echo "ERROR: hbmk2 not found under /opt/harbour/bin"
91|             echo "当前 PATH=$PATH"
92|             ls -l /tmp/harbour-linux || true
93|             # 让 job 失败以暴露更多日志
94|             exit 1
95|           fi
96|       # =================================================================================
97| 
98|       # ====================== Harbour Windows 交叉编译 + 缓存 ======================
99|       - name: Cache Harbour Windows (mingw64)
100|         id: cache-harbour-win
101|         uses: actions/cache@v4
102|         with:
103|           path: /opt/harbour-win
104|           key: harbour-win-${{ steps.harbour-commit.outputs.commit }}-${{ runner.os }}
105| 
106|       - name: 编译 Harbour Windows 交叉版（缓存未命中时执行）
107|         if: steps.cache-harbour-win.outputs.cache-hit != 'true'
108|         run: |
109|           git clone https://github.com/harbour/core /tmp/harbour-win --depth 1
110|           cd /tmp/harbour-win
111|           # 为降低对外部可选库的依赖，禁用一些可选模块（在 win 交叉编译时同样有帮助）
112|           export HB_BUILD_CONTRIBS=""
113|           export HB_WITH_GD=no
114|           export HB_WITH_FREEIMAGE=no
115|           export HB_WITH_CURL=no
116|           export HB_WITH_BZIP2=no
117|           export HB_WITH_ODBC=no
118|           export HB_WITH_FIREBIRD=no
119|           export HB_WITH_MAGIC=no
120|           export HB_WITH_CUPS=no
121|           export HB_WITH_ALLEGRO=no
122|           export HB_PLATFORM=win
123|           export HB_COMPILER=mingw64
124|           export HB_CCPATH=/usr/bin/
125|           export HB_CCPREFIX=x86_64-w64-mingw32-
126|           export HB_USER_CFLAGS="-fPIC"
127|           export HB_BUILD_CONTRIBS=""
128|           export HB_WITH_PCRE=local
129|           export HB_INSTALL_PREFIX=/opt/harbour-win
130|           # 64位 Windows 交叉编译
131|           export HB_MT=yes                       #启用多线程支持
132|           export HB_PLATFORM=win
133|           export HB_COMPILER=mingw64
134|           export HB_CCPREFIX=x86_64-w64-mingw32-
135|           # 图像/压缩库
136|           export HB_WITH_ZLIB=local          # zlib库
137|           export HB_WITH_PCRE=local          # PCRE正则库
138|           export HB_WITH_PNG=local           # PNG图像库
139|           export HB_WITH_JPEG=local          # JPEG图像库
140|           
141|           #编译不设这几个会报错
142|           export HB_WITH_CURSES=no
143|           export HB_WITH_SLANG=no
144|           export HB_WITH_X11=no
145|           export HB_WITH_MYSQL=no
146|           
147|           #没编译过，先屏蔽
148|           export HB_WITH_OPENSSL=no
149|           export HB_WITH_EXPAT=local
150|           export HB_WITH_BZIP2=no
151|           export HB_WITH_SQLITE3=no
152|           
153|           make -j$(nproc)
154|           sudo mkdir -p /opt/harbour-win
155|           sudo make install
156|       # =================================================================================
157| 
158|       # ====================== HwGUI Linux + Windows 交叉编译 + 缓存 ======================
159|       - name: Cache HwGUI（Linux + Windows 合并缓存）
160|         id: cache-hwgui
161|         uses: actions/cache@v4
162|         with:
163|           path: /opt/hwgui
164|           key: hwgui-${{ steps.hwgui-commit.outputs.commit }}-${{ steps.harbour-commit.outputs.commit }}-${{ runner.os }}
165| 
166|       - name: 编译 HwGUI Linux + Windows（缓存未命中时执行）
167|         if: steps.cache-hwgui.outputs.cache-hit != 'true'
168|         run: |
169|           git clone https://github.com/JoseQuintas/hwgui_fork /tmp/hwgui --depth 1
170|           cd /tmp/hwgui
171| 
172|           # === Linux 版 ===
173|           hbmk2 hwgui.hbp -workdir=/tmp -w3 -es2
174|           hbmk2 hbxml.hbp -workdir=/tmp -w3 -es2
175|           hbmk2 procmisc.hbp -workdir=/tmp -w3 -es2
176|           hbmk2 hwgdebug.hbp -workdir=/tmp -w3 -es2
177|           sudo mkdir -p /opt/hwgui/include /opt/hwgui/lib/linux/gcc
178|           sudo cp -r include /opt/hwgui/
179|           sudo cp lib/*.a /opt/hwgui/lib/linux/gcc/
180| 
181|           # === Windows 交叉编译版 ===
182|            HB_PLATFORM=win HB_COMPILER=mingw64 HB_CCPREFIX=x86_64-w64-mingw32- HB_CCPATH=/usr/bin hbmk2 hwgui.hbp -workdir=/tmp -w3 -es2
183|           HB_PLATFORM=win HB_COMPILER=mingw64 HB_CCPREFIX=x86_64-w64-mingw32- HB_CCPATH=/usr/bin hbmk2 hbxml.hbp -workdir=/tmp -w3 -es2
184|           HB_PLATFORM=win HB_COMPILER=mingw64 HB_CCPREFIX=x86_64-w64-mingw32- HB_CCPATH=/usr/bin hbmk2 procmisc.hbp -workdir=/tmp -w3 -es2
185|           HB_PLATFORM=win HB_COMPILER=mingw64 HB_CCPREFIX=x86_64-w64-mingw32- HB_CCPATH=/usr/bin hbmk2 hwgdebug.hbp -workdir=/tmp -w3 -es2
186|           sudo mkdir -p /opt/hwgui/lib/win/mingw64
187|           sudo cp lib/*.a /opt/hwgui/lib/win/mingw64/
188|       # =================================================================================
189| 
190|       # ====================== 构建 GUI 程序 ======================
191|       - name: Build GUI (Linux + Windows)
192|         run: |
193|           git clone https://github.com/woodhead2019/Harbour-ChineseChess.git /tmp/cchess --depth 1
194|           cd /tmp/cchess
195|           pwd
196|           chmod +x build.sh
197|           ./build.sh gui linux
198|           ./build.sh gui windows
199|         timeout-minutes: 30
200| 
201|       - name: 生成发布包（package.sh）
202|         run: |
203|           cd /tmp/cchess
204|           chmod +x package.sh
205|           ./package.sh all
206|         timeout-minutes: 10
207| 
208|       - name: 查看生成的包文件
209|         run: |
210|           cd /tmp/cchess
211|           ls -lh cchess-*-linux-x86_64.tar.gz cchess-*-windows-x86_64.zip cchess-*-source.tar.gz 2>/dev/null || echo "No packages found"
212| 
213|       # ====================== 上传 artifact ======================
214|       - name: Upload Linux package
215|         uses: actions/upload-artifact@v4
216|         with:
217|           name: linux-package
218|           path: /tmp/cchess/cchess-*-linux-x86_64.tar.gz
219|           retention-days: 30
220| 
221|       - name: Upload Windows package
222|         uses: actions/upload-artifact@v4
223|         with:
224|           name: windows-package
225|           path: /tmp/cchess/cchess-*-windows-x86_64.zip
226|           retention-days: 30
227| 
228|       - name: Upload Source package
229|         uses: actions/upload-artifact@](#)

