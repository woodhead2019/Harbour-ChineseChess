name: Build Harbour (Linux) - Stable Version

on:
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [ main, master ]
    tags:
      - 'v*'          # 推送以 v 开头的 tag 时会同时触发发布步骤

jobs:
  build:
    name: Download → Build → Package → (Optional) Release
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # 显式赋予创建 Release 所需的写权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config git wget ca-certificates jq

      - name: Download and extract Harbour core v3.2.0
        run: |
          set -euo pipefail
          pwd
          wget https://github.com/harbour/core/releases/download/v3.2.0/harbour-3.2.0.src.tar.gz
          tar -xzf harbour-3.2.0.src.tar.gz
          ls -la

          # 动态获取解压出来的实际目录名称（通常是 harbour），防止硬编码错误[cite: 1]
          EXTRACTED_DIR=$(ls -d */ | grep -v 'install' | head -n1 | sed 's/\///')
          echo "Real extracted directory: $EXTRACTED_DIR"
          
          # 存入 GitHub 全局环境变量，供后面的步骤引用[cite: 1]
          echo "HB_SRC_DIR=$EXTRACTED_DIR" >> $GITHUB_ENV
          ls -la "$EXTRACTED_DIR"

      - name: Prepare build (autogen/configure)
        run: |
          set -euo pipefail
          cd "${{ env.HB_SRC_DIR }}"
          if [ -x ./autogen.sh ]; then ./autogen.sh; fi
          if [ -f configure ]; then ./configure --prefix=$PWD/install; fi

      - name: Build (capture log)
        run: |
          set -euo pipefail
          cd "${{ env.HB_SRC_DIR }}"
          # 即使 make 失败也继续，方便后续收集日志[cite: 1]
          make -j"$(nproc)" 2>&1 | tee build.log || true

      - name: Install into local prefix
        run: |
          set -euo pipefail
          cd "${{ env.HB_SRC_DIR }}"
          make install DESTDIR=$PWD/install || true

      - name: Package build outputs
        run: |
          set -euo pipefail
          if [ -d "${{ env.HB_SRC_DIR }}/install" ]; then
            tar -czf harbour-linux-build.tar.gz -C "${{ env.HB_SRC_DIR }}" install
          else
            tar -czf harbour-linux-build.tar.gz "${{ env.HB_SRC_DIR }}/build.log" || tar -czf harbour-linux-build.tar.gz "${{ env.HB_SRC_DIR }}"
          fi
          ls -lh harbour-linux-build.tar.gz

      - name: Upload artifact (build)
        uses: actions/upload-artifact@v4
        with:
          name: harbour-linux-build
          path: harbour-linux-build.tar.gz

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harbour-build-log
          path: ${{ env.HB_SRC_DIR }}/build.log

      - name: Create GitHub release and upload asset (only for tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release_and_upload
        run: |
          set -euo pipefail
          TAG=${GITHUB_REF#refs/tags/}
          echo "Tag: $TAG"

          # Create release
          response=$(curl -s -X POST -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/releases \
            -d "$(jq -n --arg tag "$TAG" --arg name "$TAG" --arg body "Automated build for $TAG (Based on Harbour v3.2.0)" '{ tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false }')")
          
          upload_url=$(echo "$response" | jq -r .upload_url | sed -e "s/{?name,label}//")
          echo "Upload URL: $upload_url"

          if [ "$upload_url" = "null" ] || [ -z "$upload_url" ]; then
            echo "Error: Failed to create release or fetch upload_url"
            echo "API Response: $response"
            exit 1
          fi

          # upload asset
          curl --silent --show-error -X POST -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary @./harbour-linux-build.tar.gz \
            "${upload_url}?name=harbour-linux-build.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
